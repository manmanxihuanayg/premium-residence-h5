    <!-- Hero Section -->

                <div class="hero-features">
                    <span data-i18n="hero.feature1">核心地段</span>
                    <span>•</span>
                    <span data-i18n="hero.feature2">精装品质</span>
                    <span>•</span>
                    <span data-i18n="hero.feature3">24h安保</span>
                </div>
            </div>
        </div>
    </section>

<!-- Filter Section -->
<section class="filter-section" style="display: none;">
    <div class="filter-container">
        <div class="filter-item active" data-filter="all" data-i18n="filter.all">全部房源</div>
    </div>
</section>

<!-- Apartment List -->
<section class="apartments-section">
    <div class="section-header">
        <h2 data-i18n="section.title">精选房源</h2>
    </div>
    <div class="apartments-grid" id="apartmentsGrid">

    <!-- Contact CTA -->
<div class="contact-cta">

        <i class="fab fa-weixin"></i>

    </button>
<a href="tel:+862022365066" class="contact-btn phone">
    <i class="fas fa-phone"></i>
    <span data-i18n="contact.phone">电话预约</span>
</a>
</div>

    <!-- Apartment Detail Modal -->

        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle" data-i18n="modal.details">房源详情</h3>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Content loaded dynamically -->
            </div>
            <div class="modal-footer">
                <a href="https://wa.me/YOUR_WHATSAPP_NUMBER" class="modal-cta whatsapp">
                    <i class="fab fa-whatsapp"></i>
                    <span data-i18n="modal.bookNow">立即预约看房</span>

            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
        <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <!-- 添加复制微信号的脚本和样式 -->
    <script>
        // 复制微信号到剪贴板
        function copyWeChatId() {
            const wechatId = CONTACT_INFO.wechat;
            navigator.clipboard.writeText(wechatId).then(() => {
                // 显示提示
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.textContent = '微信号已复制：' + wechatId;
                toast.style.cssText = `
                    position: fixed;
                    bottom: 100px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 12px 24px;
                    border-radius: 8px;
                    z-index: 3000;
                    animation: fadeInOut 2s ease-in-out;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            }).catch(err => {
                console.error('复制失败:', err);
                alert('微信号：' + wechatId);
            });
        }
    </script>
    <style>
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            10%, 90% { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</body>
</html>
